services:
  app:
    environment:
      - NODE_ENV=production
      - ALLOWED_ORIGIN=https://marvin-nitschke.dev

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./cloudflare/origin.pem:/etc/nginx/certs/origin.pem:ro
      - ./cloudflare/origin.key:/etc/nginx/certs/origin.key:ro
