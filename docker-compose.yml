services:
  app:
    build: .
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - RATE_LIMIT_HOURLY=${RATE_LIMIT_HOURLY:-150}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-https://marvin-nitschke.dev}
    volumes:
      - ./db:/app/db
    networks:
      - web

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    networks:
      - web

networks:
  web:
    driver: bridge
